<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Südwestkirchhof Stahnsdorf</title>
  <script>
    // SPA-Fallback: GitHub Pages liefert diese Datei bei unbekannten Pfaden.
    // Wir leiten zur App-Shell weiter, damit der Client-Router
    // den Pfad auflösen kann (z.B. /poi/xxx oder /sammlung/xxx).
    // Berücksichtigt basePath /stahnsdorf in Production.
    var basePath = '/stahnsdorf';
    var path = window.location.pathname;
    if (path.startsWith(basePath)) {
      path = path.slice(basePath.length);
    }
    var search = window.location.search || '';
    window.location.replace(
      basePath + '/?redirect=' + encodeURIComponent(path + search)
    );
  </script>
</head>
<body>
  <p>Weiterleitung…</p>
</body>
</html>
