name: Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: 'test-api-key'
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: 'stahnsdorf-90e03.firebaseapp.com'
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: 'stahnsdorf-90e03'
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: 'stahnsdorf-90e03.appspot.com'
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '123456789'
      NEXT_PUBLIC_FIREBASE_APP_ID: '1:123456789:web:abcdef'
      NEXT_PUBLIC_USE_FIREBASE_EMULATOR: 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java (for Firebase Emulator)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Unit Tests
        run: npm run test

      - name: Run Firestore Rules Tests
        run: npm run test:rules

      - name: Run E2E Tests
        run: npm run test:e2e

      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
